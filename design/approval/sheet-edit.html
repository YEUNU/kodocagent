<!-- @dsCard group="Approval" name="승인 — 스프레드시트 셀 편집(sheet-edit)" subtitle="propose_sheet_edit 승인 모달 · .xlsx 셀 편집" width="820" height="720" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kodocagent — 승인: 스프레드시트 셀 편집</title>
<link rel="stylesheet" href="../assets/ds.css" />
<style>
  /* Screen-specific layout only — no color definitions, only var(--…) allowed */
  html, body { height: 100%; display: flex; align-items: center; justify-content: center; }

  /* ── Modal sizing ── */
  .modal {
    width: min(780px, 100%);
    max-height: 86vh;
  }

  /* ── Header meta row ── */
  .modal__meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .file-path {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
    color: var(--text-muted);
    background: var(--chrome-inset);
    border: 1px solid var(--chrome-border);
    border-radius: var(--r-xs);
    padding: 2px 8px;
  }

  /* ── Section label within body ── */
  .section-head {
    font-size: var(--t-xs);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* ── Paper preview wrapper ── */
  .paper-wrap {
    background: var(--chrome-bg);
    border-radius: var(--r-sm);
    padding: 16px;
  }

  /* ── Spreadsheet grid: tighter padding, mono font ── */
  .sheet-table {
    border-collapse: collapse;
    width: 100%;
    font-family: var(--font-mono);
    font-size: var(--t-sm);
  }
  .sheet-table th,
  .sheet-table td {
    border: 1px solid var(--paper-border);
    padding: 6px 10px;
    text-align: left;
    min-width: 80px;
  }
  /* Column/row header cells — sunken gray */
  .sheet-table .col-head,
  .sheet-table .row-num {
    background: var(--paper-sunken);
    color: var(--paper-ink-muted);
    font-weight: 600;
    text-align: center;
    font-size: var(--t-xs);
    min-width: 40px;
    width: 40px;
    user-select: none;
  }
  .sheet-table .col-head {
    font-family: var(--font-sans);
    letter-spacing: 0.05em;
  }

  /* Cell diff: before (strikethrough small) → after */
  .cell-diff {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cell-diff__before {
    font-size: var(--t-xs);
    color: var(--p-remove-ink);
    text-decoration: line-through;
    opacity: 0.75;
  }
  .cell-diff__after {
    font-size: var(--t-md);
    font-weight: 700;
    color: var(--p-add-ink);
    font-family: var(--font-mono);
  }
  /* Formula cell: accent tint */
  .cell-diff__after--formula {
    color: var(--accent);
  }

  /* ── Footer safe note wrapper ── */
  .footer__left {
    flex: 1;
  }
</style>
</head>
<body>

<!-- Scrim + modal -->
<div class="modal-scrim">
  <div class="modal">

    <!-- ── Header ── -->
    <div class="modal__header">
      <div class="row between">
        <div class="row gap-12">
          <span class="modal__title">스프레드시트 셀 수정</span>
          <span class="chip chip--tool">propose_sheet_edit</span>
        </div>
        <div class="row gap-8">
          <span class="chip chip--coord">
            <svg class="ico ico--sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
            C4
          </span>
          <span class="chip chip--coord">
            <svg class="ico ico--sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
            C5
          </span>
          <span class="chip chip--ok">셀 2개</span>
        </div>
      </div>

      <!-- Meta: file + sheet chip -->
      <div class="modal__meta">
        <span class="file-path">
          <svg class="ico ico--sm" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M4 15h16M10 4v16"/></svg>
          실적.xlsx
        </span>
        <span class="chip">
          <svg class="ico ico--sm" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M4 15h16M10 4v16"/></svg>
          Sheet1 · 2026실적
        </span>
      </div>
    </div>

    <!-- ── Body ── -->
    <div class="modal__body">

      <!-- Spreadsheet grid preview -->
      <div>
        <div class="section-head">미리보기 — 바뀌는 셀</div>
        <div class="paper-wrap">
          <div class="paper" style="padding: 16px 20px;">
            <table class="sheet-table doc-table">
              <thead>
                <tr>
                  <!-- Corner cell (empty) -->
                  <th class="col-head" style="border-color: var(--paper-border);"></th>
                  <th class="col-head">A</th>
                  <th class="col-head">B</th>
                  <th class="col-head">C</th>
                  <th class="col-head">D</th>
                </tr>
              </thead>
              <tbody>
                <!-- Row 1 -->
                <tr>
                  <td class="row-num">1</td>
                  <td>항목</td>
                  <td>단가</td>
                  <td>금액</td>
                  <td>비고</td>
                </tr>
                <!-- Row 2 -->
                <tr>
                  <td class="row-num">2</td>
                  <td>제작비</td>
                  <td>500,000</td>
                  <td>500,000</td>
                  <td></td>
                </tr>
                <!-- Row 3 -->
                <tr>
                  <td class="row-num">3</td>
                  <td>인쇄비</td>
                  <td>300,000</td>
                  <td>300,000</td>
                  <td></td>
                </tr>
                <!-- Row 4 — C4 changed: 1500000 → 1,500,000 -->
                <tr>
                  <td class="row-num">4</td>
                  <td>홍보비</td>
                  <td>700,000</td>
                  <td class="cell--changed">
                    <div class="cell-diff">
                      <span class="cell-diff__before">1500000</span>
                      <span class="cell-diff__after">1,500,000</span>
                    </div>
                  </td>
                  <td></td>
                </tr>
                <!-- Row 5 — C5 changed: (빈칸) → =SUM(C2:C4) -->
                <tr>
                  <td class="row-num">5</td>
                  <td style="font-weight: 600;">합계</td>
                  <td></td>
                  <td class="cell--changed">
                    <div class="cell-diff">
                      <span class="cell-diff__before t-faint" style="text-decoration: none; font-style: italic;">빈칸</span>
                      <span class="cell-diff__after cell-diff__after--formula">=SUM(C2:C4)</span>
                    </div>
                  </td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Info banner about formula cells -->
      <div class="banner banner--info">
        <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>
        <span>수식 셀은 값이 아니라 식(<code style="font-family: var(--font-mono); font-size: var(--t-xs); background: var(--accent-soft); border-radius: var(--r-xs); padding: 1px 5px;">=SUM…</code>)으로 저장됩니다. 실제 계산 결과는 스프레드시트 앱에서 확인하세요.</span>
      </div>

    </div><!-- /modal__body -->

    <!-- ── Footer ── -->
    <div class="modal__footer">
      <div class="footer__left">
        <span class="safe-note">
          <svg class="ico" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
          승인 전까지 원본은 바뀌지 않습니다
        </span>
      </div>
      <div class="modal__footer-actions">
        <button class="btn btn--danger btn--lg">
          <svg class="ico" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
          거절
        </button>
        <button class="btn btn--approve btn--lg">
          <svg class="ico" viewBox="0 0 24 24"><path d="M5 12.5 10 17 19 7"/></svg>
          승인
        </button>
      </div>
    </div>

  </div><!-- /modal -->
</div><!-- /scrim -->

</body>
</html>
