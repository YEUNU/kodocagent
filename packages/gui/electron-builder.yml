# electron-builder 설정 — kodocagent 데스크톱 앱 패키징/배포
#
# 실행 방법(로컬, 미서명):  pnpm --filter @kodocagent/gui pack   (dist/ 에 미서명 산출)
# 배포(서명·공증 필요):      pnpm --filter @kodocagent/gui publish:gui
#
# 코드사이닝/공증은 사용자 Apple Developer ID / Windows 코드사이닝 인증서가 필요하며,
# 아래 mac.* 의 서명 관련 키는 주석(자리표시자)으로 두었다. 인증서 없이도 `pack`으로
# 미서명 로컬 빌드가 가능하도록 기본값은 서명을 강제하지 않는다.
# 자세한 절차·필요 env는 docs/RELEASE-GUI.md 참고.

appId: com.kodocagent.desktop
productName: kodocagent
# 실행 파일명을 명시한다. 미설정 시 package.json name(@kodocagent/gui)에서 파생돼
# "@kodocagentgui"가 되는데, Linux AppImage는 executableName에 '@'를 허용하지 않아 빌드가 실패한다.
executableName: kodocagent

# electron 버전을 고정 명시한다. dist 는 `pnpm deploy --prod`(devDeps 제외)가 만든
# 평탄 node_modules 에서 패키징하므로 electron(devDep)이 그 디렉터리에 없어
# electron-builder 가 버전을 자동 검출하지 못한다. ⚠️ devDependencies.electron 과 동기화 유지.
electronVersion: 42.4.0

# electron-vite 번들 출력(out/)을 앱 소스로, 패키징 산출물은 dist/ 로.
directories:
  output: dist
  buildResources: assets

# 패키징에 포함할 파일 — electron-vite가 생성한 out/ 와 package.json.
files:
  - out/**/*
  - package.json

# 네이티브 모듈(.node)은 asar 안에서 dlopen 이 안 되므로 풀어둔다(asar.unpacked).
# sharp(libvips)·@napi-rs/canvas(skia)는 로더가 패키지 디렉터리 구조 전체를 검사하므로
# 디렉터리째 unpack 해야 런타임에 바이너리를 찾는다.
asarUnpack:
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
  - "**/node_modules/@napi-rs/**"

# 자동 업데이트/배포 대상 — GitHub Releases.
publish:
  provider: github
  owner: YEUNU
  repo: kodocagent

# ── macOS ──────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  target:
    - dmg
  # 문서/PII 앱이므로 강화된 런타임 + 공증을 권장한다. 인증서가 준비되면 아래 주석을 해제.
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: assets/entitlements.mac.plist
  # entitlementsInherit: assets/entitlements.mac.plist
  # notarize 는 환경변수(APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID)로 구동.
  # notarize: true

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - nsis
  # win 코드사이닝은 WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD env 로 구동(인증서 준비 시).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# ── Linux (선택) ──────────────────────────────────────────────────────────────
linux:
  target:
    - AppImage
  category: Office
