name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # pnpm 11(빌드 도구)이 Node >=22.13 요구. 런타임 engines는 >=20 유지
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    env:
      # electron 바이너리 다운로드 방지 (GUI typecheck/vite build에 불필요)
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      # Windows 러너의 pnpm junction realpath EPERM 회피
      - if: runner.os == 'Windows'
        run: pnpm config set node-linker hoisted --location project
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: node packages/cli/dist/index.js --version

  lint:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm audit --prod || true
