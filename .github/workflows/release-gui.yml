name: Release GUI

# @kodocagent/gui(Electron 데스크톱 앱)의 설치 파일(dmg/exe/AppImage)을 빌드해
# GitHub Release 에 첨부한다. CLI(npm) 발행은 release.yml 이 담당하며 이 워크플로와 독립이다.
#
# ⚠️ 미서명 빌드 — 코드사이닝/공증 인증서를 시크릿으로 주입하지 않은 상태다.
#   · macOS: 다운로드한 .dmg 의 .app 은 Gatekeeper 가 차단 → 우클릭→열기 또는
#            `xattr -dr com.apple.quarantine <app>` 로 실행(README/RELEASE-GUI.md 안내).
#   · Windows: SmartScreen 경고 → "추가 정보 → 실행".
#   서명 배포로 전환하려면 docs/RELEASE-GUI.md 의 CSC_*/APPLE_*/WIN_CSC_* 시크릿을 추가하고
#   electron-builder.yml 의 서명 키 주석을 해제한다.
#
# 트리거:
#   · gui-v* 태그 푸시  → 해당 버전으로 정식 Release 생성/갱신.
#   · 수동 실행(dry_run) → 빌드·검증만 하고 Release 는 만들지 않음.
# 릴리스 태그는 CLI(v*)와 구분되도록 `gui-v{version}` 을 쓴다.

on:
  push:
    tags: ["gui-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "빌드·검증만 하고 Release는 만들지 않음"
        type: boolean
        default: true

concurrency: release-gui-${{ github.ref }}

permissions:
  contents: write # Release 생성·자산 업로드

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "*.dmg"
          - os: windows-latest
            artifact_glob: "*.exe"
          - os: ubuntu-latest
            artifact_glob: "*.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      # Windows 러너의 pnpm junction realpath EPERM 회피 (ci.yml 과 동일)
      - if: runner.os == 'Windows'
        run: pnpm config set node-linker hoisted --location project
      - run: pnpm install --frozen-lockfile
      # 빌드(워크스페이스 의존 포함) → pnpm deploy(평탄 node_modules) → 네이티브 바이너리 보강
      # → electron-builder. pnpm 워크스페이스의 전이·동적 의존(kordoc·cfb·ajv·sharp 등)을
      # 누락 없이 패키징하는 정석 경로다. 인증서 미설정 시 자동으로 미서명 빌드.
      # (배경·동작: docs/RELEASE-GUI.md, packages/gui/scripts/package-app.mjs)
      - name: Build + package installer
        run: node packages/gui/scripts/package-app.mjs --publish never
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.os }}
          # 설치 파일 + electron-updater 메타(latest*.yml)·blockmap 만 수집(unpacked 디렉터리 제외).
          path: |
            packages/gui/dist/${{ matrix.artifact_glob }}
            packages/gui/dist/*.yml
            packages/gui/dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    # 태그 푸시면 항상, 수동 실행이면 dry_run=false 일 때만 Release 생성.
    # always() — 일부 OS 빌드가 실패해도 성공한 플랫폼 설치파일은 릴리스에 첨부한다
    # (설치파일이 하나도 없으면 아래 가드에서 명확히 실패).
    if: ${{ always() && (github.event_name == 'push' || github.event.inputs.dry_run == 'false') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Resolve GUI version and tag
        id: ver
        run: |
          V=$(node -p "require('./packages/gui/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=gui-v$V" >> "$GITHUB_OUTPUT"
      # 태그 푸시면 태그가 package.json 버전과 일치하는지 검증(메타 yml 버전 불일치 방지).
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.ref_name }}" != "${{ steps.ver.outputs.tag }}" ]; then
            echo "::error::태그 ${{ github.ref_name }} ≠ package.json 버전 기반 ${{ steps.ver.outputs.tag }}. gui package.json 버전을 맞추세요."
            exit 1
          fi
      - name: List collected artifacts (설치파일이 하나도 없으면 실패)
        run: |
          ls -lah artifacts || true
          count=$(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) 2>/dev/null | wc -l)
          echo "설치파일 수: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::빌드된 설치파일(.dmg/.exe/.AppImage)이 하나도 없습니다 — 모든 OS 빌드 실패."
            exit 1
          fi
      - name: Create or update GitHub Release (unsigned GUI)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          NOTES=$(cat <<EOF
          kodocagent 데스크톱 앱 **v$VERSION** (미서명 빌드)

          | 플랫폼 | 파일 |
          | --- | --- |
          | macOS | \`.dmg\` |
          | Windows | \`.exe\` (NSIS 설치 관리자) |
          | Linux | \`.AppImage\` |

          ### ⚠️ 미서명 빌드 실행 안내
          이 빌드는 코드사이닝/공증이 적용되지 않았습니다.
          - **macOS**: \`.dmg\` 의 앱을 \`/Applications\` 로 옮긴 뒤, 다운로드 격리 속성을 제거하세요(가장 확실):
            \`\`\`
            xattr -dr com.apple.quarantine /Applications/kodocagent.app
            \`\`\`
            그 후 앱을 실행하면 됩니다. (앱을 옮기지 않고 우클릭 → 열기 도 보통 동작하지만,
            macOS 버전에 따라 막힐 수 있어 위 명령이 가장 확실합니다.)
          - **Windows**: SmartScreen 경고 시 **추가 정보 → 실행**.

          자세한 패키징·서명 절차는 [docs/RELEASE-GUI.md](https://github.com/YEUNU/kodocagent/blob/main/docs/RELEASE-GUI.md), 변경 이력은 [packages/gui/CHANGELOG.md](https://github.com/YEUNU/kodocagent/blob/main/packages/gui/CHANGELOG.md) 참고.
          EOF
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 존재 — 자산 갱신(--clobber)"
            gh release upload "$TAG" artifacts/* --clobber
          else
            echo "Release $TAG 신규 생성"
            # --latest 명시: GUI 릴리스를 GitHub "Latest" 로 둔다. electron-updater stable 채널이
            # /releases/latest 에서 latest.yml 을 읽으므로, 자동업데이트가 항상 최신 GUI 를 가리키게 한다.
            # (CLI 릴리스는 release.yml 에서 --latest=false 로 제외 — 채널 충돌 방지)
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "GUI v$VERSION (unsigned)" \
              --notes "$NOTES" \
              --latest \
              artifacts/*
          fi
