name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency: release-${{ github.ref }}

permissions:
  contents: write # 태그 푸시
  id-token: write # npm OIDC Trusted Publishing (장기 토큰 불필요)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # 22.x 최신 = Node >=22.14 (Trusted Publishing 요건)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # 번들 스모크 — 발행 직전 인라인 번들 dist 가 실제로 기동하는지 검증한다.
      # `pnpm test`(소스)만으로는 esbuild ESM 번들의 동적 require 회귀(0.7.2: iconv-lite →
      # safer-buffer `require("buffer")` 크래시) 같은 번들 전용 결함을 못 잡으므로 게이트 필수.
      - run: node packages/cli/dist/index.js --version
      # @kodocagent/cli 단일 패키지만 발행 (내부 패키지는 private — dist에 인라인 번들).
      #
      # 인증: npm OIDC Trusted Publishing — 장기 NPM_TOKEN/2FA 불필요.
      #   ⚠️ 최초 1회 사용자 설정 필요: npmjs.com → @kodocagent/cli → Settings →
      #      Trusted Publisher 추가 (GitHub Actions / 저장소: YEUNU/kodocagent /
      #      워크플로 파일: release.yml). 등록 전에는 발행 단계가 실패한다.
      #
      # pnpm 11은 OIDC 발행에 404 회귀(pnpm#11513)가 있어 npm CLI로 발행한다.
      # workspace:* devDependencies는 npm이 해석하지 못하므로 발행 직전 제거
      # (dist가 자급자족 번들이라 소비자에게 불필요).
      - name: Publish @kodocagent/cli (OIDC Trusted Publishing)
        env:
          # gh release create 가 인증에 쓰는 토큰. 없으면 release 페이지 생성이 조용히 실패한다
          # (npm 발행·태그는 되지만 GitHub Release 노트가 안 생김).
          GH_TOKEN: ${{ github.token }}
        run: |
          npm install -g npm@latest   # Trusted Publishing 요건: npm >=11.5.1
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          PUBLISHED=$(npm view @kodocagent/cli version 2>/dev/null || echo none)
          echo "local=$LOCAL published=$PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "@kodocagent/cli@$LOCAL 는 이미 발행됨 — 건너뜀"
            exit 0
          fi
          cd packages/cli
          npm pkg delete devDependencies
          npm publish --access public --provenance
          cd - > /dev/null
          git tag "v$LOCAL"
          git push origin "v$LOCAL" || true
          # --latest=false 필수: CLI 릴리스를 GitHub "Latest" 에서 제외한다. GUI 자동업데이트
          # (electron-updater)는 stable 채널에서 /releases/latest 의 tag 로 latest.yml 을 읽는데,
          # CLI 릴리스가 "Latest" 가 되면 거기엔 업데이트 메타가 없어 GUI OTA 가 깨진다.
          # (CLI 배포 실체는 npm 이라 GitHub "Latest" 배지는 GUI 앱이 갖는 게 맞다.)
          gh release create "v$LOCAL" --title "v$LOCAL" --generate-notes --latest=false || true
