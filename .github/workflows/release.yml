name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency: release-${{ github.ref }}

permissions:
  contents: write # 태그 푸시
  id-token: write # npm OIDC Trusted Publishing (장기 토큰 불필요)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # 22.x 최신 = Node >=22.14 (Trusted Publishing 요건)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # @kodocagent/cli 단일 패키지만 발행 (내부 패키지는 private — dist에 인라인 번들).
      #
      # 인증: npm OIDC Trusted Publishing — 장기 NPM_TOKEN/2FA 불필요.
      #   ⚠️ 최초 1회 사용자 설정 필요: npmjs.com → @kodocagent/cli → Settings →
      #      Trusted Publisher 추가 (GitHub Actions / 저장소: YEUNU/kodocagent /
      #      워크플로 파일: release.yml). 등록 전에는 발행 단계가 실패한다.
      #
      # pnpm 11은 OIDC 발행에 404 회귀(pnpm#11513)가 있어 npm CLI로 발행한다.
      # workspace:* devDependencies는 npm이 해석하지 못하므로 발행 직전 제거
      # (dist가 자급자족 번들이라 소비자에게 불필요).
      - name: Publish @kodocagent/cli (OIDC Trusted Publishing)
        run: |
          npm install -g npm@latest   # Trusted Publishing 요건: npm >=11.5.1
          LOCAL=$(node -p "require('./packages/cli/package.json').version")
          PUBLISHED=$(npm view @kodocagent/cli version 2>/dev/null || echo none)
          echo "local=$LOCAL published=$PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "@kodocagent/cli@$LOCAL 는 이미 발행됨 — 건너뜀"
            exit 0
          fi
          cd packages/cli
          npm pkg delete devDependencies
          npm publish --access public --provenance
          cd - > /dev/null
          git tag "v$LOCAL"
          git push origin "v$LOCAL" || true
          gh release create "v$LOCAL" --title "v$LOCAL" --generate-notes || true
