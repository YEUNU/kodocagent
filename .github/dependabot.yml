version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    groups:
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      dev-tooling:
        patterns:
          - "tsup"
          - "vitest"
          - "@biomejs/*"
          - "@changesets/*"
          - "typescript"
          - "@types/*"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
